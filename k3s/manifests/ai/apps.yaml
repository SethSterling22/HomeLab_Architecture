---
# k3s/manifests/ai/apps.yaml
# Optional web UI for the AI namespace.
#
# NOTE on Hermes: the real Hermes (the custom HTTP gateway / agent brain) is NOT
# defined here. It runs on Ocra via Docker Compose (see ../../../n8n/docker-compose.yaml),
# and its optional k8s manifest lives in ../../../hermes-agent/k8s/hermes-stack.yaml.
# This file only carries OpenClaw, an optional chat web UI that talks to Ollama.
#
# OpenClaw reaches Ollama through the ExternalName Service in ollama.yaml
# (ollama.ai.svc.cluster.local:11434 → Sadida, where Ollama runs locally).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ai
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      # Prefer Sram or Ocra for the UI
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["sram", "ocra"]
      containers:
        - name: openclaw
          image: openclaw/openclaw:latest   # replace with the real image
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama.ai.svc.cluster.local:11434"
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: secret-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: ai
spec:
  selector:
    app: openclaw
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
# Secret placeholder — fill in with a real value or use Sealed Secrets
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: ai
type: Opaque
stringData:
  secret-key: "change-me-to-a-secure-secret"   # openssl rand -hex 32
