---
# k3s/manifests/ai/ollama.yaml
# Ollama se despliega como Deployment que apunta a la VM con GPU en Nitro
# La VM nitro-ollama (192.168.1.12) expone la API en el puerto 11434
# Este Deployment actúa como proxy dentro del clúster
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
  labels:
    app: ollama
    homelab/node: nitro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Forzar ejecución en el nodo Nitro (donde está la VM GPU)
      nodeSelector:
        kubernetes.io/hostname: nitro-k3s-master
      tolerations:
        - key: "homelab/gpu-node"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: api
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: "/models"
            - name: OLLAMA_NUM_PARALLEL
              value: "2"
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "14Gi"
              cpu: "6"
          volumeMounts:
            - name: models
              mountPath: /models
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
      name: api
  type: ClusterIP
