---
# k3s/manifests/ai/ollama.yaml
# Ollama is NOT deployed as a pod. It runs locally on Sadida (host service,
# the only node with a discrete GPU, RTX 3050) and listens on :11434.
#
# This ExternalName Service lets in-cluster clients keep using the stable DNS
# name "ollama.ai.svc.cluster.local:11434" while the traffic is transparently
# routed to Sadida over Tailscale MagicDNS.
#
# Models are installed directly on Sadida (see scripts/ai/pull-models.sh):
#   ollama pull qwen3:1.7b
#   ollama pull qwen3.5:4b
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai
  labels:
    app: ollama
spec:
  type: ExternalName
  externalName: sadida.stegosaurus-panga.ts.net
  ports:
    - port: 11434
      targetPort: 11434
      name: api
