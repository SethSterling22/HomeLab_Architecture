---
# k3s/manifests/ingress/ingressroutes.yaml
# Traefik IngressRoutes to expose services.
# Reachable at: http://<any-node-IP>/<service>
#
# NOTE: Hermes is NOT exposed here. It runs on Ocra via Docker Compose and is
# reached internally by n8n at http://localhost:8080 (shared Tailscale netns).

# ── OpenClaw ─────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
  namespace: ai
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: PathPrefix(`/openclaw`)
      kind: Rule
      middlewares:
        - name: strip-openclaw
      services:
        - name: openclaw
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-openclaw
  namespace: ai
spec:
  stripPrefix:
    prefixes:
      - /openclaw

---
# ── Grafana ──────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/grafana`)
      kind: Rule
      services:
        - name: grafana
          port: 80

---
# ── Traefik Dashboard (internal access only) ──────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`traefik.homelab.local`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      middlewares:
        - name: traefik-auth
          namespace: kube-system
      services:
        - name: api@internal
          kind: TraefikService
---
# Basic auth for the Traefik dashboard
# Generate with: htpasswd -nb admin yourpassword | base64
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-auth
  namespace: kube-system
spec:
  basicAuth:
    secret: traefik-dashboard-auth
---
apiVersion: v1
kind: Secret
metadata:
  name: traefik-dashboard-auth
  namespace: kube-system
type: Opaque
stringData:
  users: "admin:$apr1$xxxxx"   # replace with a real htpasswd hash
