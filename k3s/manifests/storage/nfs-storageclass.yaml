---
# k3s/manifests/storage/nfs-storageclass.yaml
# StorageClass that uses Aery (192.168.68.190) as the NFS backend.
# Requires: helm install nfs-provisioner nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-aery
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: cluster.local/nfs-subdir-external-provisioner
parameters:
  archiveOnDelete: "false"
  onDelete: "delete"
reclaimPolicy: Delete
volumeBindingMode: Immediate
---
# NOTE: there is no Ollama PVC. Ollama runs locally on Sadida (host service),
# so its models live on Sadida's disk, not on an NFS-backed cluster volume.
---
# PVC for OpenClaw data (optional web UI)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data-pvc
  namespace: ai
spec:
  storageClassName: nfs-aery
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
