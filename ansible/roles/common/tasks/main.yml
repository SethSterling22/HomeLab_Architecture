---
# ansible/roles/common/tasks/main.yml
- name: Install base packages
  apt:
    name:
      - curl
      - wget
      - git
      - htop
      - iotop
      - net-tools
      - nfs-common        # to mount NFS shares from Aery
      - wakeonlan          # to send magic packets
      - open-iscsi        # iSCSI client
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - unattended-upgrades
    state: present
    update_cache: true

- name: Configure timezone
  timezone:
    name: America/Puerto_Rico

- name: Disable swap (required by k3s)
  shell: |
    swapoff -a
    sed -i '/ swap / s/^/#/' /etc/fstab
  changed_when: false

- name: Configure kernel parameters for k3s
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward",                  value: "1" }
    - { key: "vm.max_map_count",                     value: "262144" }

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay

- name: Persist modules across reboots
  copy:
    content: |
      br_netfilter
      overlay
    dest: /etc/modules-load.d/k3s.conf

- name: Configure key-only SSH authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PermitRootLogin",        line: "PermitRootLogin prohibit-password" }
    - { regexp: "^#?PubkeyAuthentication",   line: "PubkeyAuthentication yes" }
  notify: restart sshd

- name: Install the public SSH key
  authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ ssh_public_key }}"
    state: present

- name: Configure automatic security updates
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
