---
# ansible/playbooks/bootstrap.yml
# Base setup for all Debian nodes (except Aery, which is a Synology NAS).
- name: Bootstrap Debian nodes
  hosts: k3s_master:k3s_workers:compose_brain
  become: true
  gather_facts: true

  pre_tasks:
    - name: Check connectivity
      ping:

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

  roles:
    - role: common

  post_tasks:
    - name: Show node info
      debug:
        msg: "OK {{ inventory_hostname }} ({{ ansible_default_ipv4.address }}) — bootstrap complete"

- name: Set up Tailscale subnet router on the Sadida host
  hosts: k3s_master
  become: true

  tasks:
    - name: Install Tailscale
      shell: |
        curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Bring up Tailscale as a subnet router
      shell: |
        tailscale up \
          --authkey="{{ tailscale_auth_key }}" \
          --advertise-routes="{{ tailscale_subnet_route }}" \
          --accept-dns=false
      register: ts_result
      changed_when: "'already' not in ts_result.stdout"

    - name: Enable IP forwarding (required for a subnet router)
      sysctl:
        name: "{{ item }}"
        value: "1"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - net.ipv4.ip_forward
        - net.ipv6.conf.all.forwarding
