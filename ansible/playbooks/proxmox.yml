---
# ansible/playbooks/proxmox.yml
# Prepares the Sadida Proxmox host.
#
# In this home lab the k3s control-plane and Ollama run DIRECTLY on the
# Proxmox host (no guest VMs), so this playbook only configures the host
# itself: package repos and the NVIDIA driver for the local GPU that
# Ollama uses.
- name: Configure the Sadida Proxmox host
  hosts: sadida
  become: true
  gather_facts: true

  tasks:
    - name: Enable the no-subscription repo (home lab)
      copy:
        content: "deb http://download.proxmox.com/debian/pve trixie pve-no-subscription\n"
        dest: /etc/apt/sources.list.d/pve-no-subscription.list
      notify: apt update

    - name: Disable the enterprise repo
      file:
        path: /etc/apt/sources.list.d/pve-enterprise.list
        state: absent

    - name: Install base host packages
      apt:
        name:
          - curl
          - git
          - nfs-common
        state: present
        update_cache: true

    # ── Local GPU for Ollama ─────────────────────────────────────
    # The RTX 3050 is used by Ollama running on this host (no PCI
    # passthrough, since there are no guest VMs).
    - name: Install NVIDIA driver for the local GPU
      apt:
        name:
          - nvidia-driver
          - firmware-misc-nonfree
        state: present
        update_cache: true
      notify: reboot host

  handlers:
    - name: apt update
      apt:
        update_cache: true

    - name: reboot host
      debug:
        msg: "NVIDIA driver installed — reboot the host to load the kernel module."
